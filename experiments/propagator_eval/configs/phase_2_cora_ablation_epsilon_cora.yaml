# Phase 2 — Cora epsilon sweep
# Run matrix target: diffusion × Cora × beta10000 × 3 seeds × 3 tolerances = 9 runs

phase_name: phase_2_cora_ablation
runner: intrinsic
ablation_family: epsilon_cora

operators:
  - diffusion

datasets:
  - Cora

beta: [10000]
seeds: [0, 1, 2]
hop: 1

results_dir: experiments/propagator_eval/results/phase_2_cora_ablation/raw/epsilon_cora
save_results: true
use_wandb: false

num_iterations: 100
feature_prop_tolerance: 1.0e-4
diffusion_t: 0.1
alpha: 0.5

# Run separately with tolerance overrides: {1e-2, 1e-3, 1e-4}

intrinsic_eval: true
log_per_iter: true
num_clients: 10
feature_prop_device: cuda
intrinsic_runner_backend: threadpool
