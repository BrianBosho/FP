# Layer 1-3: Intrinsic / Convergence / Efficiency — primary sweep
# Operators O1-O4 + O6 across all 6 datasets, 2 betas, 3 seeds
# Run matrix: 5 operators × 6 datasets × 2 betas × 3 seeds = 180 runs
# Active plan uses only β = 10000 and β = 1

operators:
  - adjacency               # O1: Normalized adjacency (FedProp-Adj)
  - asymmetric_random_walk  # O2: D^{-1}A random walk
  - diffusion               # O3: Taylor diffusion (FedProp-Diff)
  - chebyshev_diffusion     # O4: Chebyshev heat kernel (K=5)
  - appnp                   # O6: APPNP / PPR (α=0.1)

datasets:
  - Cora
  - Citeseer
  - Pubmed
  - OGBN-Arxiv
  - Texas
  - Wisconsin

beta: [10000, 1]
seeds: [0, 1, 2]
hop: 1

results_dir: experiments/propagator_eval/results/intrinsic
save_results: true
use_wandb: false

# Propagation settings
num_iterations: 100
feature_prop_tolerance: 1e-4
diffusion_t: 0.1
chebyshev_k: 5
chebyshev_t: 0.9
appnp_alpha: 0.1
alpha: 0.5

# Instrumentation
intrinsic_eval: true
log_per_iter: true       # Collect residuals list per client

# Infrastructure
num_clients: 10
feature_prop_device: cuda
intrinsic_runner_backend: threadpool
