# Layer 4: Downstream baselines — zero-hop and oracle (homophilic datasets)
# Zero-hop: 4 datasets × 2 betas × 2 backbones × 5 seeds = 80 runs
# Oracle:   3 datasets × 2 betas × 2 backbones × 5 seeds = 60 runs (OGBN excluded)

operators:
  - zero_hop   # Lower bound: no feature imputation
  - full       # Oracle upper bound: exact remote features

datasets:
  - Cora
  - Citeseer
  - Pubmed
  - OGBN-Arxiv

# Oracle not run on OGBN-Arxiv (pre-training communication not feasible at scale)
oracle_exclude_datasets:
  - OGBN-Arxiv

beta: [10000, 1]
backbones: [GCN, GAT]
seeds: [0, 1, 2, 3, 4]
hop: 1

results_dir: experiments/propagator_eval/results/downstream
save_results: true
use_wandb: false

# FL training settings
num_clients: 10
num_rounds: 200
epochs: 3
early_stopping_patience: 10
aggregation: fedavg_weighted

# Model architecture
model_architecture:
  GCN:
    hidden_dim: 16
    num_layers: 2
    dropout: 0.5
    normalization: "none"
  GAT:
    hidden_dim: 8
    num_layers: 2
    num_heads: 8
    dropout: 0.6
    normalization: "none"

# Per-dataset optimizer settings
training_per_dataset:
  Cora:
    GCN: {optimizer: SGD, lr: 0.5, weight_decay: 0.0005}
    GAT: {optimizer: Adam, lr: 0.005, weight_decay: 0.0005}
  Citeseer:
    GCN: {optimizer: SGD, lr: 0.5, weight_decay: 0.0005}
    GAT: {optimizer: Adam, lr: 0.005, weight_decay: 0.0005}
  Pubmed:
    GCN: {optimizer: Adam, lr: 0.01, weight_decay: 0.0005}
    GAT: {optimizer: Adam, lr: 0.01, weight_decay: 0.0005}
  OGBN-Arxiv:
    GCN: {optimizer: Adam, lr: 0.01, weight_decay: 0.0}
    GAT: {optimizer: Adam, lr: 0.01, weight_decay: 0.0}

# Infrastructure
feature_prop_device: cuda
keep_data_on_gpu: true
max_concurrent_clients: 10
