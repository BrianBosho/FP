# Layer 1-3: Heat kernel exact (O5) — reference only
# Eigendecomposition is O(n^3); restricted to small graphs only
# Run matrix: 1 operator × 2 datasets × 1 beta × 1 seed = 2 runs

operators:
  - heat_kernel_exact       # O5: Exact heat kernel via eigendecomposition

datasets:
  - Cora       # 2,708 nodes — safe
  - Citeseer   # 3,327 nodes — safe

beta: [10000]
seeds: [0]
hop: 1

results_dir: experiments/propagator_eval/results/intrinsic
save_results: true
use_wandb: false

# Heat kernel settings
diffusion_t: 1.0           # t parameter for exp(-t*L)
num_iterations: 1          # Single-shot — no iteration loop

# Instrumentation
intrinsic_eval: true
log_per_iter: false        # No per-iter residuals for single-shot operator

# Infrastructure
num_clients: 10
feature_prop_device: cpu   # Eigendecomp safer on CPU
intrinsic_runner_backend: threadpool
