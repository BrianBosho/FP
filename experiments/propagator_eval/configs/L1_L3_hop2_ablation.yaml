# Layer 1-3: Hop=2 topology ablation — Cora only
# All 5 primary operators at 2-hop subgraph depth
# Run matrix: 5 operators × 1 dataset × 3 betas × 3 seeds = 45 runs

operators:
  - adjacency
  - asymmetric_random_walk
  - diffusion
  - chebyshev_diffusion
  - appnp

datasets:
  - Cora

beta: [10000, 1]
seeds: [0, 1, 2]
hop: 2

results_dir: experiments/propagator_eval/results/intrinsic_hop2
save_results: true
use_wandb: false

# Propagation settings
num_iterations: 100
feature_prop_tolerance: 1e-4
diffusion_t: 0.1
chebyshev_k: 5
chebyshev_t: 0.9
appnp_alpha: 0.1
alpha: 0.5

# Instrumentation
intrinsic_eval: true
log_per_iter: true

# Infrastructure
num_clients: 10
feature_prop_device: cuda
intrinsic_runner_backend: threadpool
