# R5b: Client-count scaling — Cora (diffusion + full)
# Runs DESCENDING K so heavy propagation starts small and works up
# 11 client counts × 2 propagations × 2 betas = 44 experiments

datasets: [Cora]
num_clients: [20, 18, 16, 14, 12, 10, 8, 6, 4, 2, 1]
num_rounds: 200
beta: [10000, 1]
data_loading: [diffusion, full]
models: [GCN]
use_pe: [false]
repetitions: 5
experiment_seed: 42
results_dir: experiments/results/R5
save_results: true
resume_completed: true
hop: 1
use_wandb: false
epochs: 3
early_stopping_patience: 20

model_architecture:
  GCN:
    hidden_dim: 16
    num_layers: 2
    dropout: 0.5
    normalization: "none"

training:
  lr: 0.5
  optimizer: "SGD"
  weight_decay: 0.0005
  epochs: 3
  patience: 20

num_iterations: 50
diffusion_t: 0.1
aggregation: "fedavg_weighted"
feature_prop_device: cuda

device: cuda
keep_data_on_gpu: true
max_concurrent_clients: 10
