# A4: 1-hop vs 2-hop accessibility — Cora, hop=2
# Compares all FedProp methods at 2-hop local subgraph depth
# Locked design: β∈{10000,10,1}, 10 seeds = 4 methods × 3 betas × 10 seeds = 120 runs (paired with hop1)

datasets: [Cora]
num_clients: [10]
num_rounds: 600
beta: [10000, 10, 1]
data_loading: [zero_hop, adjacency, diffusion, full]
models: [GCN]
hop: 2
use_pe: [false]

repetitions: 10
experiment_seed: 42
results_dir: experiments/results/A4_cora_hop2
save_results: true
use_wandb: false
epochs: 3
early_stopping_patience: 10

model_architecture:
  GCN:
    hidden_dim: 16
    num_layers: 2
    dropout: 0.5
    normalization: "none"

training:
  lr: 0.5
  optimizer: "SGD"
  weight_decay: 0.0005
  epochs: 3
  patience: 10

num_iterations: 50
diffusion_t: 0.1
aggregation: "fedavg_weighted"
feature_prop_device: cuda

device: cuda
keep_data_on_gpu: true
max_concurrent_clients: 10
