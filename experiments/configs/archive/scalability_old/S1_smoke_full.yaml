# S1-smoke-full: OGBN-Arxiv full mode, 10 clients, GPU, single run.
# Purpose: verify 10 clients work end-to-end with bounded full-mode concurrency.
# 1 rep, 10 rounds — just enough to prove no OOM and get a result JSON.

datasets: [ogbn-arxiv]
num_clients: [10]
num_rounds: 10
beta: [10000]
data_loading: [full]
models: [GCN]
use_pe: [false]

repetitions: 1
experiment_seed: 342
results_dir: experiments/results/scalability/ogbn_arxiv_smoke_full
save_results: true
resume_completed: false
hop: 2
use_wandb: false
epochs: 3
early_stopping_patience: 10

model_architecture:
  GCN:
    hidden_dim: 256
    num_layers: 3
    dropout: 0.5
    normalization: "batch"

training:
  lr: 0.01
  optimizer: "Adam"
  weight_decay: 0
  epochs: 3
  patience: 10

num_iterations: 50
diffusion_t: 0.1
aggregation: "fedavg_weighted"

device: cuda
feature_prop_device: cpu
ray_num_gpus: 1
keep_data_on_gpu: false
use_shard_cache: true
shard_cache_dir: artifacts/shard_cache
adaptive_device: true
adaptive_time_threshold_sec: 120
use_minibatch: true
batch_size: 2048
num_neighbors: [25, 25, 25]
max_concurrent_clients: 10
use_amp: true
prop_dtype: bfloat16
convergence_check_interval: 5
ray_object_store_memory_bytes: 4294967296
