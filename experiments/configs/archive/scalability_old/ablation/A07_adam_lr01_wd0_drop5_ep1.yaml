# A07: Adam lr=0.01, wd=0, dropout=0.5, 1 local epoch — faster per round
model_architecture:
  GCN:
    hidden_dim: 256
    num_layers: 3
    dropout: 0.5
    normalization: "batch"

training:
  lr: 0.01
  optimizer: "Adam"
  weight_decay: 0
  epochs: 1
  patience: 30

results_dir: experiments/results/scalability/ogbn_arxiv_ablation/A07_adam_lr01_wd0_drop5_ep1
