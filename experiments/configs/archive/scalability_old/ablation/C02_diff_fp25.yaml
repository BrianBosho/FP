# C02: diffusion mode, FP 25 iterations
data_loading: [diffusion]
model_architecture:
  GCN:
    hidden_dim: 256
    num_layers: 3
    dropout: 0.5
    normalization: "batch"

training:
  lr: 0.01
  optimizer: "Adam"
  weight_decay: 0
  epochs: 3
  patience: 30

num_iterations: 25
results_dir: experiments/results/scalability/ogbn_arxiv_ablation/C02_diff_fp25
