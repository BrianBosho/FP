# R1b: Pubmed GAT PE — adjacency only (3 conditions)

datasets: [Pubmed]
num_clients: [10]
num_rounds: 400
beta: [10000, 10, 1]
data_loading: [adjacency]
models: [GAT]
hop: 2
use_pe: [true]

