# R1b: GAT accuracy table — Citeseer (No PE)
# Matches R1 GCN hyperparameters; inherits GAT architecture from base.yaml

datasets: [Citeseer]
num_clients: [10]
num_rounds: 400
beta: [10000, 10, 1]
data_loading: [zero_hop, adjacency, diffusion, full]
models: [GAT]
hop: 2
use_pe: [false]

repetitions: 10
results_dir: experiments/results/R1b_citeseer_nope
save_results: true
use_wandb: false

# Match R1 GCN settings
num_iterations: 50
diffusion_t: 0.1
aggregation: "fedavg_weighted"
early_stopping_patience: 30

# Optimizer settings (top level — same as R1 GCN Citeseer)
lr: 0.5
optimizer: SGD
