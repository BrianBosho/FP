# Rerun: Cora GCN — top-up for incomplete config
# Targets: full β=10000 (9/10 → need 1 more, running 5 fresh reps)

datasets: [Cora]
num_clients: [10]
num_rounds: 400
beta: [10000]
data_loading: [full]
models: [GCN]
hop: 1
use_pe: [false]

repetitions: 5
experiment_seed: 200
results_dir: experiments/results/R1_cora_topup
save_results: true
use_wandb: false

model_architecture:
  GCN:
    hidden_dim: 16
    num_layers: 2
    dropout: 0.5
    normalization: "none"

training:
  lr: 0.5
  optimizer: "SGD"
  weight_decay: 0.0005
  epochs: 3
  patience: 30

num_iterations: 50
diffusion_t: 0.1
aggregation: "fedavg_weighted"
early_stopping_patience: 30
feature_prop_device: cuda

device: cuda
keep_data_on_gpu: true
max_concurrent_clients: 10
