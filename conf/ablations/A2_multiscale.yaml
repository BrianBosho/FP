# A2: Multi-Scale Fusion Experiments
# Based on A1c results: hop=2 is best, iter=50, t=1.0 → 0.7553
# Strategy: multi-scale weighted fusion of iter_depths [5, 20, 50]
# Compare single-scale vs multi-scale at hop=2

datasets:
  - Cora

results_dir: results/ablations/A2_multiscale
use_wandb: false
wandb_mode: disabled

num_clients: [10]
num_rounds: 100
early_stopping_patience: 15

beta: [10000]
lr: 0.5
optimizer: SGD
models: [GCN]
repetitions: 3

data_loading: [diffusion]
num_iterations: [50]
diffusion_t: [0.5, 1.0]
alpha: 1.0
hop: 2

# Multi-scale fusion config
multiscale_fusion: true
scale_iterations: [5, 20, 50]
# fusion_weights: null  # null = uniform [1/3, 1/3, 1/3]

log_feature_prop_energy: true
debug: false