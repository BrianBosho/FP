# Pubmed Dataset Configuration
# Only dataset-specific settings - everything else inherited from base.yaml

datasets:
   - Pubmed
results_dir: results/pubmed
wandb_project: "FGL3-Pubmed"  # Dataset-specific wandb project

# Pubmed-specific experiment parameters
num_clients: [10]
num_rounds: 10
beta: [10000]
lr: 0.01
optimizer: Adam  # Pubmed works better with Adam
data_loading: [full]
models: [GCN]
