# Citeseer Dataset Configuration
# Only dataset-specific settings - everything else inherited from base.yaml

datasets:
   - Citeseer
results_dir: results/citeseer
wandb_project: "FGL3-Citeseer"  # Dataset-specific wandb project

# Citeseer-specific experiment parameters
num_clients: [10]
num_rounds: 100
beta: [1, 10, 10000]
lr: 0.5
data_loading: [full, adjacency, zero_hop]
models: [GCN, GAT]
