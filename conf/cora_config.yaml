# Cora Dataset Configuration
# Only dataset-specific settings - everything else inherited from base.yaml

datasets:
   - Cora
results_dir: results/cora
wandb_project: "FGL3-Cora"  # Dataset-specific wandb project

# Cora-specific experiment parameters
num_clients: [10]
num_rounds: 100
beta: [1]
lr: 0.5
data_loading: [adjacency]
models: [GCN]

# nohup command to run the experiment
# nohup python -m src.experiments.run_experiments --config conf/cora_config.yaml > cora_config.out 2>&1 &