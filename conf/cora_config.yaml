# Cora Dataset Configuration
# Only dataset-specific settings - everything else inherited from base.yaml

datasets:
   - Cora
results_dir: results/IEEE/cora
# Keep W&B off for unattended sweeps. The runtime reads use_wandb/wandb_mode;
# keep the legacy wandb key only for older helpers.
wandb: false
use_wandb: false
wandb_mode: disabled
wandb_project: "FGL7-Cora"  # Dataset-specific wandb project

# Cora-specific experiment parameters
num_clients: [10]
num_rounds: 200
beta: [10000]
lr: 0.5
optimizer: SGD
data_loading: [diffusion, full, zero_hop, adjacency]
models: [GCN, GAT]
hop: 1
use_pe: [True]
repetitions: 3
aggregation: fedavg_weighted

# Optional: Override model architecture for Cora experiments
# Uncomment and modify these to experiment with different architectures
model_architecture:
  GCN:
    hidden_dim: 16          # Try different hidden dimensions (default: 16)
    num_layers: 2           # Try deeper models (default: 2)
    dropout: 0.5            # Try different dropout rates (default: 0.5)
    normalization: "none"  # Try batch normalization (default: "none")


