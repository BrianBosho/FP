# Cora Dataset Configuration
num_clients:
  - 10
num_rounds: 10
epochs: 3
beta:
  - 1
  - 10
  - 10000
lr: 0.5
optimizer: SGD
decay: 0.0005
datasets:
   - Cora
data_loading:
  - full
  - adjacency
  - zero_hop
models:
  - GCN
  - GAT
results_dir: results/cora
save_results: true
hop: 1
fulltraining_flag: false 
use_minibatch: false
auto_minibatch_if_large: false
batch_size: 1024
num_neighbors: [10, 10, 10]
use_amp: true
max_concurrent_clients: 0
use_pe:
  - false
  - true
pe_r: 64
pe_P: 16
normalize: qr
num_iterations: 80
feature_prop_tolerance: 1e-6
feature_prop_device: "cuda"
repetitions: 5

# Wandb configuration
use_wandb: false  # Set to true to enable wandb logging
wandb_project: "FGL3-Cora"  # Project name for wandb
wandb_entity: null  # Set to your wandb entity/team name (optional)
wandb_mode: "online"  # "online", "offline", or "disabled"

# Chebyshev-specific hyperparameters (tunable)
chebyshev_k: 5          # Chebyshev polynomial order (3-15, higher=more accurate)
chebyshev_t: 1        # Diffusion time (0.01-0.5, smaller=gentler per iteration)
