# Citeseer Dataset Configuration
# Only dataset-specific settings - everything else inherited from base.yaml

datasets:
   - Computers
results_dir: results/computers
wandb_project: "FGL3-Computers"  # Dataset-specific wandb project

# Citeseer-specific experiment parameters
num_clients: [10]
num_rounds: 200
beta: [1]
lr: 0.005
optimizer: Adam
data_loading: [diffusion]
models: [GCN]
repetitions: 1
use_amp: false
use_pe: [false]

# nohup command to run the experiment
# nohup python -m src.experiments.run_experiments --config conf/computers_config.yaml > computers_config.out 2>&1 &