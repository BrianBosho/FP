# FedProp equivalent of fedgraph/test.ipynb (FedGCN run).
# Maps notebook settings 1-to-1:
#   global_rounds=100  -> num_rounds: 100
#   local_step=3       -> epochs: 3
#   n_trainer=10       -> num_clients: 10
#   iid_beta=10000     -> beta: [10000]
#   num_hops=2         -> hop: 2,  data_loading: [adjacency]
#   method=FedGCN/GCN  -> models: [GCN],  use_pe: [False]
#   batch_size=-1      -> full batch (use_minibatch: false)
#
# Run:
#   nohup python -m src.experiments.run_experiments --config conf/cora_minimal_full.yaml > cora_minimal_full.log 2>&1 &

datasets:
  - Cora
results_dir: runs/cora_minimal

wandb: false
use_wandb: false
wandb_mode: disabled

num_clients: 10
num_rounds: 300
epochs: 3
beta: [10000]
partition_seed: null  # Match fedgraph/test.py: no explicit NumPy seed before partitioning.
lr: 0.5
optimizer: SGD
data_loading: [adjacency]
models: [GCN]
hop: 2
use_pe: [False]
repetitions: 5
aggregation: fedavg_weighted

early_stopping_patience: 20

device: cuda
max_concurrent_clients: 10
feature_prop_device: cuda
keep_data_on_gpu: true
use_minibatch: false

model_architecture:
  GCN:
    hidden_dim: 16
    num_layers: 2
    dropout: 0.5
    normalization: "none"


# nohup command to run the experiment
# nohup python -m src.experiments.run_experiments --config conf/cora_minimal_full.yaml > cora_minimal_full.log 2>&1 &
