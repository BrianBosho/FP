# Experiment config for Amazon Computers dataset
num_clients: [3]
num_rounds: 5
epochs: 3
beta: [1.0]
lr: 0.5
optimizer: SGD
decay: 0.0005
hop: 1
fulltraining_flag: false
use_minibatch: false
auto_minibatch_if_large: false
batch_size: 1024
num_neighbors: [10, 10, 10]
use_amp: false  # Smaller dataset, full precision is fine
use_pe: [false]

# Datasets and loading options
# data_loading must match options handled in src/run.py: full_dataset, zero_hop, adjacency, diffusion
# You can provide multiple to run them all sequentially

datasets: ["Computers"]
data_loading: ["adjacency", "full", "zero_hop"]

# Models to try
models: ["GCN"]

# Results directory
results_dir: "../results/experiments/amazon_computers"

# Save detailed results (CSV/JSON/TXT)
save_results: true

# nohup python -m src.experiments.run_experiments --config conf/ablation/amazon-computers_config.yaml
feature_prop_device: "cpu"