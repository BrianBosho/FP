num_clients:
  - 5
num_rounds: 10
epochs: 3
beta:
  - 1
lr: 0.5
optimizer: SGD
decay: 0.0005
datasets:
   - ogbn-arxiv
data_loading:
  - full
models:
  - GCN
results_dir: results/review/ablation/ogbn-arxiv
save_results: False
hop: 2
fulltraining_flag: false 
use_minibatch: false
auto_minibatch_if_large: false
batch_size: 1024
num_neighbors: [10, 10, 10]
use_amp: true  # Enable mixed precision training for memory savings
max_concurrent_clients: 2  # Train 2 clients at a time to limit peak GPU memory (None or 0 = all parallel)
use_pe:
  - false
pe_r: 64
pe_P: 16
normalize: qr
num_iterations: 80
feature_prop_tolerance: 1e-6
feature_prop_device: "cpu"

# Diffusion-specific hyperparameters
# diffusion_t: 1.0        # Taylor series diffusion time (default 1.0, original behavior)

# Chebyshev-specific hyperparameters (tunable)
chebyshev_k: 5          # Chebyshev polynomial order (3-15, higher=more accurate)
chebyshev_t: 1        # Diffusion time (0.01-0.5, smaller=gentler per iteration) - reduced from 1.0

# nohup python -m src.experiments.run_experiments --config conf/ablation/ogbn-arxiv_config.yaml