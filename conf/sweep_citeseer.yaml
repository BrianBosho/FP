method: grid
name: citeseer_focused_sweep
parameters:
  lr:
    values: [0.001, 0.005, 0.01, 0.1, 0.5]
  decay:
    values: [0.001, 0.0005]
  optimizer:
    values: ["SGD", "Adam"]
  beta:
    values: [1, 10000]
command:
  - ${env}
  - python
  - -m
  - src.experiments.run_experiments
  - --config
  - conf/baseline/citeseer_baseline_wandb.yaml