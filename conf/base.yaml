# Core experiment defaults (can be overridden in dataset configs)
num_clients: 10
num_rounds: 10
epochs: 3
beta: 1
lr: 0.5
optimizer: SGD
decay: 0.0005
hop: 1
fulltraining_flag: false
save_results: true
repetitions: 1

# Debug configuration
debug: false  # Set to true to enable verbose debug output

# Wandb configuration
use_wandb: false  # Set to true to enable wandb logging
wandb_project: "FGL4"  # Project name for wandb
wandb_entity: null  # Set to your wandb entity/team name (optional)
wandb_mode: "online"  # "online", "offline", or "disabled"

# Technical/Infrastructure settings (rarely change)
use_minibatch: false
auto_minibatch_if_large: false
batch_size: 1024
num_neighbors: [10, 10, 10]
use_amp: true
max_concurrent_clients: 0  # Number of clients to train in parallel per batch

# Positional encoding settings
use_pe: [true]
pe_r: 64
pe_P: 16
normalize: qr

# Feature propagation settings
num_iterations: 80
feature_prop_tolerance: 1e-6
feature_prop_device: "cuda"  # Use GPU for fast preprocessing, then move to CPU

# Chebyshev/Diffusion hyperparameters
diffusion_t: 1.0        # Taylor series diffusion time
chebyshev_k: 5          # Chebyshev polynomial order
chebyshev_t: 0.9          # Chebyshev diffusion time

# Model architecture hyperparameters
# These can be overridden per dataset or per model type
model_architecture:
  # Default hyperparameters (applied to all models unless overridden)
  default:
    hidden_dim: 16              # Hidden layer dimensions
    num_layers: 2               # Number of GNN layers (excluding input layer)
    dropout: 0.5                # Dropout rate
    normalization: "none"       # Options: "batch", "layer", "group", "none"
    activation: "relu"          # Options: "relu", "elu", "tanh", "none"
    
  # GCN-specific hyperparameters
  GCN:
    hidden_dim: 16
    num_layers: 2
    dropout: 0.5
    normalization: "none"
    
  # GCN_arxiv-specific hyperparameters (for ogbn-arxiv dataset)
  GCN_arxiv:
    hidden_dim: 256
    num_layers: 3
    dropout: 0.5
    normalization: "batch"
    
  # GAT-specific hyperparameters
  GAT:
    hidden_dim: 8
    num_layers: 2
    dropout: 0.6
    num_heads: 8
    normalization: "none"
    
  # PubmedGAT-specific hyperparameters
  PubmedGAT:
    hidden_dim: 8
    num_layers: 2
    dropout: 0.6
    num_heads: 8
    normalization: "none"

# Training hyperparameters per dataset (can override in dataset configs)
training:
  default:
    lr: 0.5
    optimizer: "SGD"
    weight_decay: 0.0005
    epochs: 3
    patience: 10  # Early stopping patience
    
paths:
  datasets_dir: "datasets"
  planetoid:
    cora: "datasets/cora"
    citeseer: "datasets/citeseer"
    pubmed: "datasets/pubmed"
  ogbn:
    arxiv: "datasets/ogbn_arxiv"
  amazon:
    computers: "datasets/amazon/computers"
    photo: "datasets/amazon/photo"
