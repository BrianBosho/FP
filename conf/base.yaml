# Core experiment defaults (can be overridden in dataset configs)
num_clients: 10
num_rounds: 10
epochs: 3
beta: 1
lr: 0.5
optimizer: SGD
decay: 0.0005
hop: 1
fulltraining_flag: false  # WARNING: true = oracle baseline with cross-client label leakage
save_results: true
repetitions: 5
resume_completed: false  # When true, skip condition directories with complete results_*.json files

# Early stopping patience (number of rounds with no improvement before stopping)
early_stopping_patience: 10

# Federated aggregation strategy (B1 / backward-compatible opt-in):
#   "mean"             -> simple unweighted average across clients (existing behavior)
#   "fedavg_weighted"  -> weight each client's params by |D_k| / sum_k |D_k|
#                         where |D_k| = number of training samples on client k
# Anything other than "fedavg_weighted" falls through to the mean path.
aggregation: "mean"

# BatchNorm FL strategy (B2 / backward-compatible opt-in):
#   "average"  -> average BN running-mean/var across clients (legacy behavior)
#   "fedbn"    -> skip BN running stats; only aggregate weight/bias. Clients keep
#                their own running-mean/var (FedBN from Li et al. 2021).
bn_fl_strategy: "average"

# Global experiment seed (C5 / backward-compatible opt-in):
#   null              -> preserve legacy seeding (partition=123, minibatch=42,
#                        full-batch & RFP unseeded).  This is the current behavior.
#   <int>             -> seeds the partitioner, RFP, and per-client training.
#                        Per-client training seed = experiment_seed + client_id.
experiment_seed: null

# Per-FL-round convergence logging (backward-compatible opt-in):
#   log_per_round: true   -> record {round, avg_client_val_acc, avg_client_val_loss,
#                            best_eval_acc_so_far, patience} into
#                            results_data["rounds"][i]["round_history"].  Cheap
#                            (metrics are already computed by Server.train_clients).
#   log_per_round: false  -> preserve legacy behavior (no per-round history
#                            recorded in JSON; only the final repetition summary).
log_per_round: true
#
# Optional: also run a *global* test on the full graph after each FL round.
# Adds one evaluate pass per round, so keep it off for large graphs.
log_global_test_per_round: false

# Debug configuration
debug: false  # Set to true to enable verbose debug output

# Wandb configuration
use_wandb: true  # Set to true to enable wandb logging
wandb_project: "FGL4"  # Project name for wandb
wandb_entity: null  # Set to your wandb entity/team name (optional)
wandb_mode: "online"  # "online", "offline", or "disabled"

# Technical/Infrastructure settings (rarely change)
use_minibatch: false
auto_minibatch_if_large: false
batch_size: 1024
num_neighbors: [10, 10, 10]
use_amp: false
grad_clip_norm: 1.0
max_concurrent_clients: 10  # Number of clients to train in parallel per batch
client_num_gpus: null       # null => 1 / max_concurrent_clients when using CUDA
ray_num_gpus: null          # null => torch.cuda.device_count()

# Positional encoding settings
use_pe: [false]
pe_r: 64
pe_P: 16
normalize: qr
rfp_qr_max_nodes: 50000

# Feature propagation settings
num_iterations: 80
feature_prop_tolerance: 1e-6
feature_prop_relative_tolerance: false
log_feature_prop_energy: false
feature_prop_device: "cuda"  # Set to "cpu" to save GPU memory during preprocessing
fp_max_concurrent: 1  # Max clients running FP in parallel. 1=serial (safe default).
                      # Increase only if GPU memory allows (e.g. 4 on a 24 GB card with small subgraphs).
                      # Each extra concurrent client holds one full subgraph on fp_device simultaneously.

# Global evaluation surface:
# Multi-client runs evaluate the aggregated server model on the same
# preprocessed client test graphs used by clients, keeping test inputs on the
# same distribution as training. Single-client/centralised runs use the full
# graph. This legacy key is retained for old configs but no longer controls the
# main evaluation path.
global_eval_uses_fp: false

# Global evaluation PE mode (C2 / backward-compatible opt-in):
#   "local"         -> current behavior: PE computed per-client. Global test may
#                      see different PEs. Document the mismatch.
#   "global_compute" -> compute RFP once on the full graph before global eval.
#                      Aligns train/eval but leaks structural info across clients.
global_eval_pe_mode: "local"

# GPU Memory Optimization Settings
keep_data_on_gpu: true   # Keep data on GPU during training to avoid CPU<->GPU transfers
                        # Set to false for large datasets (ogbn-products) that will OOM
adaptive_device: false  # When true: try GPU first; fall back to CPU on OOM or if rep-1 exceeds threshold
adaptive_time_threshold_sec: 120  # Seconds — if rep 1 takes longer than this on GPU, switch remaining reps to CPU

# Chebyshev/Diffusion hyperparameters
diffusion_t: 1.0        # Taylor series diffusion time
chebyshev_k: 5          # Chebyshev polynomial order
chebyshev_t: 0.9          # Chebyshev diffusion time
force_chebyshev_for_large_graphs: true

# Model architecture hyperparameters
# These can be overridden per dataset or per model type
model_architecture:
  # Default hyperparameters (applied to all models unless overridden)
  default:
    hidden_dim: 16              # Hidden layer dimensions
    num_layers: 2               # Number of GNN layers (excluding input layer)
    dropout: 0.5                # Dropout rate
    normalization: "none"       # Options: "batch", "layer", "group", "none"
    activation: "relu"          # Options: "relu", "elu", "tanh", "none"
    
  # GCN-specific hyperparameters
  GCN:
    hidden_dim: 16
    num_layers: 2
    dropout: 0.5
    normalization: "none"
    
  # GCN_arxiv-specific hyperparameters (for ogbn-arxiv dataset)
  GCN_arxiv:
    hidden_dim: 256
    num_layers: 3
    dropout: 0.5
    normalization: "batch"
    
  # GAT_Arxiv-specific hyperparameters (for ogbn-arxiv dataset)
  GAT_Arxiv:
    hidden_dim: 256
    num_layers: 3
    dropout: 0.5
    normalization: "batch"
    heads_hidden: 4
    heads_out: 6
    num_heads: 8  # For compatibility with unified GAT model
    
  # GAT-specific hyperparameters
  GAT:
    hidden_dim: 8
    num_layers: 2
    dropout: 0.6
    num_heads: 8
    normalization: "none"
    
  # PubmedGAT-specific hyperparameters
  PubmedGAT:
    hidden_dim: 8
    num_layers: 2
    dropout: 0.6
    num_heads: 8
    normalization: "none"

# Training hyperparameters per dataset (can override in dataset configs)
training:
  default:
    lr: 0.5
    optimizer: "SGD"
    weight_decay: 0.0005
    epochs: 3
    patience: 10  # Early stopping patience
    
paths:
  datasets_dir: "/home/shared-space/fedgnn-datasets"
  planetoid:
    cora: "/home/shared-space/fedgnn-datasets/cora"
    citeseer: "/home/shared-space/fedgnn-datasets/citeseer"
    pubmed: "/home/shared-space/fedgnn-datasets/pubmed"
  ogbn:
    arxiv: "/home/shared-space/fedgnn-datasets/ogbn_arxiv"
    products: "/home/shared-space/fedgnn-datasets/ogbn_products"
  amazon:
    computers: "/home/shared-space/fedgnn-datasets/amazon/computers"
    photo: "/home/shared-space/fedgnn-datasets/amazon/photo"
  webkb:
    texas: "local_datasets/webkb/texas"
    wisconsin: "local_datasets/webkb/wisconsin"
