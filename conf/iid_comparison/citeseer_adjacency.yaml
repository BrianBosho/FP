# Citeseer IID: adjacency (baseline)
datasets:
  - Citeseer
results_dir: results/iid_comparison/citeseer_adjacency
use_wandb: false
wandb_mode: disabled
num_clients: [10]
num_rounds: 100
early_stopping_patience: 15
beta: [10000]
lr: 0.5
optimizer: SGD
models: [GCN]
repetitions: 3
data_loading: [adjacency]
hop: 2
struct_reg_lambda: 0.1
struct_reg_warmup_rounds: 5
log_feature_prop_energy: true
debug: false
