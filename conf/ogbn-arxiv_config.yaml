# ogbn-arxiv Dataset Configuration
# Only dataset-specific settings - everything else inherited from base.yaml

datasets:
   - Cora  # Note: This config is for ogbn-arxiv but uses Cora for testing
results_dir: results/review/ablation/ogbn-arxiv
wandb_project: "FGL3"  # Dataset-specific wandb project

# ogbn-arxiv-specific experiment parameters
num_clients: [5]
num_rounds: 20
beta: [1]
lr: 0.5
hop: 2
save_results: False
use_wandb: true  # Enable wandb for this experiment
data_loading: [full]
models: [GCN]