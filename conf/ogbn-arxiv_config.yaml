# ogbn-arxiv Dataset Configuration
# Only dataset-specific settings - everything else inherited from base.yaml

datasets:
   - ogbn-arxiv   # Note: This config is for ogbn-arxiv but uses Cora for testing
results_dir: results/ogbn-arxiv
wandb_project: "FGL4-Ogbn-Arxiv"  # Dataset-specific wandb project

# ogbn-arxiv-specific experiment parameters
num_clients: [10]
num_rounds: 5
beta: [1,  10000]
lr: 0.005
optimizer: Adam
hop: 1
save_results: true
use_wandb: true  # Enable wandb for this experiment
data_loading: [full, zero_hop, adjacency, diffusion, chebyshev-diffusion]  # Use full data loading strategy for ogbn-arxiv
models: [GAT]
repetitions: 1
use_pe: [true]
use_unified_model: false



# Override for large dataset - train fewer clients in parallel
max_concurrent_clients: 2  # Reduced from 5 to 2 for ogbn-arxiv's large memory footprint

# Disable keep_data_on_gpu for large dataset to prevent GPU OOM
keep_data_on_gpu: false  # Large dataset - move data back to CPU after each operation

# Override model architecture for ogbn-arxiv
# This will override the settings from base.yaml for this specific experiment
model_architecture:
  GCN_arxiv:
    hidden_dim: 256        # Can change to 128, 512, etc.
    num_layers: 3          # Can change to 2, 4, 5, etc.
    dropout: 0.5           # Can change to 0.3, 0.6, etc.
    normalization: "batch" # Can change to "layer", "group", or "none"
  GAT_Arxiv:
    hidden_dim: 256        # Can change to 128, 512, etc.
    num_layers: 3          # Can change to 2, 4, 5, etc.
    dropout: 0.5           # Can change to 0.3, 0.6, etc.
    normalization: "batch" # Can change to "layer", "group", or "none"
    heads_hidden: 4        # Number of attention heads in hidden layers
    heads_out: 6           # Number of attention heads in output layer
    num_heads: 8           # For compatibility with unified GAT model

# Override training hyperparameters for ogbn-arxiv
training:
  lr: 0.001
  optimizer: "Adam"
  weight_decay: 0.0005
  epochs: 3
  patience: 15  # Early stopping patience for larger dataset

# nohup command to run the experiment
# nohup python -m src.experiments.run_experiments --config conf/ogbn-arxiv_config.yaml > ogbn-arxiv_config_gat_test.out 2>&1 &