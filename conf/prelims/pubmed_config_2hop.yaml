# Pubmed 2-hop Prelim — GCN & GAT, PE vs no-PE
# Quick 3-rep runs to fill gap: no existing hop-2 GCN results for Pubmed (R1 is hop-1).
# Uses Adam lr=0.01 (Pubmed standard). Matches Cora pilot structure for direct comparison.

datasets:
  - Pubmed
results_dir: experiments/pubmed_results_prelim

use_wandb: true
wandb_mode: online
wandb_project: "TMLR Pubmed Prelim"
wandb_entity: bosho

num_clients: [10]
num_rounds: 400
beta: [10000, 10]
lr: 0.01
optimizer: Adam
data_loading: [diffusion, adjacency]
models: [GCN, GAT]
hop: 2
use_pe: [True, False]
repetitions: 3
aggregation: fedavg_weighted
early_stopping_patience: 30

# nohup python -m src.experiments.run_experiments --config conf/prelims/pubmed_config_2hop.yaml > pubmed_prelim_2hop.log 2>&1 &
